
# Prometheus configuration for HLTV Pro Scraper v4.0
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "hltv-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "hltv-pro"
